<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website BetaScript</title>

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: system-ui, -apple-system, sans-serif;
background: #f4f6f8;
color: #112211;
}
.container {
max-width: 800px;
margin: 0 auto;
padding: 20px;
}
.header {
background: linear-gradient(135deg, #1b4332, #40916c);
color: white;
padding: 40px 24px;
border-radius: 18px;
text-align: center;
}
.header h1 {
font-size: 2rem;
margin-bottom: 12px;
}
.main {
margin-top: 24px;
}
.card {
background: white;
padding: 20px;
border-radius: 12px;
box-shadow: 0 2px 8px rgba(0,0,0,0.06);
margin-bottom: 16px;
}
.card h2 {
color: #1b4332;
margin-bottom: 8px;
}
.footer {
margin-top: 40px;
text-align: center;
opacity: 0.7;
font-size: 0.9rem;
}
</style>
</head>
<body>
<div class="container">
<header class="header">
<h1>Selamat Datang</h1>
<p>Website dari BetaScript</p>
</header>
<main class="main">
<section class="card">
<h2>Tentang</h2>
<p>Ini adalah website yang dibuat menggunakan bahasa pemrograman BetaScript.</p>
</section>
<section class="card">
<h2>Kontak</h2>
<p>Email: halo@betascript.dev</p>
</section>
</main>
<footer class="footer">
<p>&copy; 2026 BetaScript</p>
</footer>
</div>
</body>
</html>
